name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  NODE_VERSION: "v22.14.0"
  GIT_VERSION: "2.53.0"
  NODE_MIRROR: "https://npmmirror.com/mirrors/node"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Full edition (bundled Node.js + Git)
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macOS-arm64-Full
            edition: full
          - platform: macos-latest
            target: x86_64-apple-darwin
            label: macOS-x64-Full
            edition: full
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: Windows-x64-Full
            edition: full
          # Lite edition (online download)
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macOS-arm64-Lite
            edition: lite
          - platform: macos-latest
            target: x86_64-apple-darwin
            label: macOS-x64-Lite
            edition: lite
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: Windows-x64-Lite
            edition: lite

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      # --- Full edition: download bundled resources ---
      - name: Download bundled Node.js (Full - macOS arm64)
        if: matrix.edition == 'full' && matrix.target == 'aarch64-apple-darwin'
        run: |
          mkdir -p src-tauri/resources/node
          curl -L -o src-tauri/resources/node/node-${{ env.NODE_VERSION }}-darwin-arm64.tar.gz \
            "${{ env.NODE_MIRROR }}/${{ env.NODE_VERSION }}/node-${{ env.NODE_VERSION }}-darwin-arm64.tar.gz"

      - name: Download bundled Node.js (Full - macOS x64)
        if: matrix.edition == 'full' && matrix.target == 'x86_64-apple-darwin'
        run: |
          mkdir -p src-tauri/resources/node
          curl -L -o src-tauri/resources/node/node-${{ env.NODE_VERSION }}-darwin-x64.tar.gz \
            "${{ env.NODE_MIRROR }}/${{ env.NODE_VERSION }}/node-${{ env.NODE_VERSION }}-darwin-x64.tar.gz"

      - name: Download bundled Node.js + MinGit (Full - Windows)
        if: matrix.edition == 'full' && matrix.target == 'x86_64-pc-windows-msvc'
        shell: bash
        run: |
          mkdir -p src-tauri/resources/node src-tauri/resources/git
          curl -L -o src-tauri/resources/node/node-${{ env.NODE_VERSION }}-win-x64.zip \
            "${{ env.NODE_MIRROR }}/${{ env.NODE_VERSION }}/node-${{ env.NODE_VERSION }}-win-x64.zip"
          curl -L -o src-tauri/resources/git/MinGit-${{ env.GIT_VERSION }}-64-bit.zip \
            "https://registry.npmmirror.com/-/binary/git-for-windows/v${{ env.GIT_VERSION }}.windows.1/MinGit-${{ env.GIT_VERSION }}-64-bit.zip"

      - name: Download bundled Git bottle (Full - macOS arm64)
        if: matrix.edition == 'full' && matrix.target == 'aarch64-apple-darwin'
        run: |
          mkdir -p src-tauri/resources/git
          # Download sonoma bottle (compatible with sequoia via fallback)
          TOKEN=$(curl -s "https://ghcr.io/token?scope=repository:homebrew/core/git:pull" | python3 -c "import json,sys;print(json.load(sys.stdin)['token'])")
          curl -L -H "Authorization: Bearer $TOKEN" -o src-tauri/resources/git/git-${{ env.GIT_VERSION }}-arm64_sonoma.bottle.tar.gz \
            "https://ghcr.io/v2/homebrew/core/git/blobs/sha256:90035e05c20b14efb12550b50431b53da8d857ccd5d29ac7fafe8ab0f959d16e"

      - name: Download bundled Git bottle (Full - macOS x64)
        if: matrix.edition == 'full' && matrix.target == 'x86_64-apple-darwin'
        run: |
          mkdir -p src-tauri/resources/git
          TOKEN=$(curl -s "https://ghcr.io/token?scope=repository:homebrew/core/git:pull" | python3 -c "import json,sys;print(json.load(sys.stdin)['token'])")
          curl -L -H "Authorization: Bearer $TOKEN" -o src-tauri/resources/git/git-${{ env.GIT_VERSION }}-sonoma.bottle.tar.gz \
            "https://ghcr.io/v2/homebrew/core/git/blobs/sha256:4831766b1d63c27c19f6c84e2f74a2c2b1131a69f818467fab6b84536ca26d90"

      - name: Verify bundled resources (Full)
        if: matrix.edition == 'full'
        shell: bash
        run: |
          echo "=== Bundled resources ==="
          find src-tauri/resources -type f -exec ls -lh {} \;
          # Verify files are not empty
          for f in $(find src-tauri/resources -type f); do
            size=$(stat -f%z "$f" 2>/dev/null || stat -c%s "$f" 2>/dev/null)
            if [ "$size" -lt 1000 ]; then
              echo "ERROR: $f is too small ($size bytes), download may have failed"
              exit 1
            fi
          done
          echo "All resources verified."

      - name: Inject resources config into tauri.conf.json (Full)
        if: matrix.edition == 'full'
        shell: bash
        run: |
          # Add resources to bundle config using node
          node -e "
            const fs = require('fs');
            const conf = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
            conf.bundle.resources = { 'resources/**/*': 'resources/' };
            fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(conf, null, 2) + '\n');
            console.log('Injected resources config into tauri.conf.json');
          "

      # --- Set productName based on edition so artifact filenames include the suffix ---
      - name: Set productName for edition
        shell: bash
        run: |
          node -e "
            const fs = require('fs');
            const conf = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
            const edition = '${{ matrix.edition }}';
            const suffix = edition.charAt(0).toUpperCase() + edition.slice(1);
            conf.productName = 'OpenClawX-' + suffix;
            fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(conf, null, 2) + '\n');
            console.log('productName set to: ' + conf.productName);
          "

      # --- Build ---
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "OpenClawX ${{ github.ref_name }}"
          releaseBody: |
            ## OpenClawX ${{ github.ref_name }}

            ### Downloads

            **Full 完整版**（推荐，内置 Node.js + Git，无需联网安装依赖）
            | Platform | File |
            |----------|------|
            | macOS (Apple Silicon) | `OpenClawX-Full_*_aarch64.dmg` |
            | macOS (Intel) | `OpenClawX-Full_*_x64.dmg` |
            | Windows | `OpenClawX-Full_*_x64-setup.exe` |

            **Lite 精简版**（体积小，运行时在线下载依赖）
            | Platform | File |
            |----------|------|
            | macOS (Apple Silicon) | `OpenClawX-Lite_*_aarch64.dmg` |
            | macOS (Intel) | `OpenClawX-Lite_*_x64.dmg` |
            | Windows | `OpenClawX-Lite_*_x64-setup.exe` |
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Get version from tag
        id: version
        run: |
          echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Download Full edition assets from release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p release-assets
          gh release download "${{ steps.version.outputs.tag }}" \
            --pattern "OpenClawX-Full_*" \
            --repo "${{ github.repository }}" \
            --dir release-assets
          echo "=== Downloaded files ==="
          ls -lh release-assets/

      - name: Install ossutil
        run: |
          curl -L -o /usr/local/bin/ossutil \
            "https://gosspublic.alicdn.com/ossutil/1.7.17/ossutil64"
          chmod +x /usr/local/bin/ossutil

      - name: Upload to Aliyun OSS
        env:
          OSS_ENDPOINT: ${{ secrets.OSS_ENDPOINT }}
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
          OSS_BUCKET: ${{ secrets.OSS_BUCKET }}
        run: |
          for f in release-assets/OpenClawX-Full_*; do
            filename=$(basename "$f")
            echo "Uploading $filename ..."
            ossutil cp "$f" "oss://${OSS_BUCKET}/${filename}" \
              -e "${OSS_ENDPOINT}" \
              -i "${OSS_ACCESS_KEY_ID}" \
              -k "${OSS_ACCESS_KEY_SECRET}" \
              --force
          done

      - name: Trigger website version update
        env:
          WEBLONGXIA_DEPLOY_TOKEN: ${{ secrets.WEBLONGXIA_DEPLOY_TOKEN }}
          NEW_VERSION: ${{ steps.version.outputs.version }}
        run: |
          curl -X POST \
            -H "Authorization: token ${WEBLONGXIA_DEPLOY_TOKEN}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/no1coder/weblongxia/dispatches" \
            -d "{\"event_type\":\"new-release\",\"client_payload\":{\"version\":\"${NEW_VERSION}\"}}"
          echo "Triggered weblongxia update for v${NEW_VERSION}"
