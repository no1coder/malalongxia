name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macOS-arm64
          - platform: macos-13
            target: x86_64-apple-darwin
            label: macOS-x64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: Windows-x64

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "OpenClawX ${{ github.ref_name }}"
          releaseBody: |
            ## OpenClawX ${{ github.ref_name }}

            ### Downloads
            | Platform | File |
            |----------|------|
            | macOS (Apple Silicon) | `OpenClawX_*_aarch64.dmg` |
            | macOS (Intel) | `OpenClawX_*_x64.dmg` |
            | Windows | `OpenClawX_*_x64-setup.exe` |

            ### Changes
            - 18 installation stability improvements
            - Cross-platform reliability enhancements
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}
